# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL (env vars with local-dev fallbacks) ─────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/timetable_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection pool — retry on startup until MySQL is ready ───────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:DPTPortalSMITSecretKey2026SuperSecureLongKeyHMACSHA256xxx}
app.jwt.expiration-ms=86400000

# ── Upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost,http://localhost:80}
